map $http_upgrade $connection_upgrade {
	default upgrade;
	'' close;
}

server {
	gzip on;
	gzip_comp_level  2;
	gzip_min_length  1000;
	gzip_types  text/xml text/css;
	gzip_http_version 1.1;
	gzip_vary  on;
	gzip_disable "MSIE [4-6] \.";

	listen 80;

	location /bisheng/ {
		alias /usr/share/nginx/html/platform/;
	}

	location /bisheng/workspace/ {
		alias /usr/share/nginx/html/client/;
	}

	location ~ ^/bisheng(/workspace)?/api(/|$) {
		rewrite ^/bisheng(/workspace)?/(.*)$ $2 break;
		proxy_pass http://backend:7860;
		proxy_read_timeout 300s;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_http_version 1.1;
		proxy_set_header Upgrade $http_upgrade;
		proxy_set_header Connection $connection_upgrade;
		client_max_body_size 200m;
		add_header Access-Control-Allow-Origin "http://192.168.106.120:3002";
		add_header X-Frame-Options SAMEORIGIN;
		# proxy_set_header Connection "Upgrade";
	}
}
